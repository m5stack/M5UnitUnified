description: Unified library for handling various M5 unit products (sensors, actuators, peripherals).
url: https://github.com/m5stack/M5UnitUnified
issues: https://github.com/m5stack/M5UnitUnified/issues
license: MIT
version: "0.4.6"

dependencies:
  idf: ">=5.0"
  m5stack/M5HAL:
    git: https://github.com/m5stack/M5HAL.git
    version: feature/esp-idf-native-support
  m5stack/M5Utility:
    git: https://github.com/m5stack/M5Utility.git
    version: feature/esp-idf-native-support

targets:
  - esp32
  - esp32s3
  - esp32c3
  - esp32c6
  - esp32p4

files:
  exclude:
    - "docs/**"
    - "examples/**"
    - "test/**"
    - "tmp/**"
    - "tmp_*.md"
    - ".github/**"
    - ".vscode/**"
    - ".pio/**"
    - "boards/**"
    - "lib/**"
    - "datasheet/**"
    - "tools/**"
    - "platformio.ini"
    - "platformio.tmp"
    - "library.json"
    - "library.properties"
    - "src/googletest/**"
    - "*.log"
    - "*.tmp"
    - "todo.txt"
